apiVersion: tdf.7sg.ai/v1
kind: TargetDefinition
metadata:
  name: azure-east-fa-alt-awstest
  displayName: Azure East - Financial Analysis Alternate (gpt-4.1-nano) (awstest clone)
  description: >-
    Azure target in eastus2 for deploying the financial-analysis alternate
    scenario (gpt-4.1-nano) on Azure Container Apps. Uses a separate ACR and
    Container Apps environment for isolation. Cloned for rg-financial-analysis-aws-test.
  tags:
    provider: azure
    geo: us
    tier: alternate
    platform: container-apps
target:
  provider: azure
  regions:
  - eastus2
  geography:
    continent: na
    country: us
    zoneGroup: us-central
  networking:
    defaultNetworkPolicy: private
  services:
  - name: container-apps
    type: container-platform
    providerService: Azure Container Apps
    capabilities:
      supportsManagedIdentity: true
      supportsCustomDomains: true
      supportsScaleToZero: true
      supportsDapr: true
    defaults:
      resourceGroup: financial-analysis-alt-rg-awstest
      location: eastus2
      environment: financial-analysis-alt-awstest-env-eastus2
      logAnalyticsWorkspace: financial-analysis-logs-awstest

  - name: acr
    type: container-registry
    providerService: Azure Container Registry
    endpoints:
      registry: uvfinancialaltacrawstest.azurecr.io
    defaults:
      registryName: uvfinancialaltacrawstest
      resourceGroup: financial-analysis-alt-rg-awstest

  - name: synapse
    type: spark
    providerService: Azure Synapse Spark
    endpoints:
      workspace: https://financial-analysis-synapse-awstest.dev.azuresynapse.net
    defaults:
      workspaceName: financial-analysis-synapse-awstest
      sparkPoolName: sparkpool
      resourceGroup: rg-financial-analysis-aws-test
    capabilities:
      supportsPrivateEndpoints: true

  - name: adls
    type: object-store
    providerService: ADLS Gen2
    endpoints:
      dfs: https://financialanalysissynapseawstest.dfs.core.windows.net
    defaults:
      storageAccountName: financialanalysissynapseawstest
      container: data
    capabilities:
      supportsPrivateEndpoints: true

  - name: keyvault
    type: secrets
    providerService: Azure Key Vault
    endpoints:
      vault: https://wdf-secret-manager-awstest.vault.azure.net/
    capabilities:
      supportsPrivateEndpoints: true

  - name: managed-identity
    type: identity
    providerService: Managed Identity

  - name: observability
    type: observability
    providerService: Azure Monitor / Log Analytics

  infrastructure:
    containerAppsEnvironment:
      name: financial-analysis-alt-awstest-env-eastus2
      resourceGroup: financial-analysis-alt-rg-awstest
      location: eastus2
    containerRegistry:
      name: uvfinancialaltacrawstest
      service: acr
    secretStores:
    - name: wdf-secret-manager-awstest
      service: keyvault
