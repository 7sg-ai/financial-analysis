apiVersion: tdf.7sg.ai/v1
kind: TargetDefinition
metadata:
  name: azure-east-fa-alt
  displayName: Azure East - Financial Analysis Alternate (gpt-4.1-mini)
  description:
    Azure target in eastus2 for deploying the financial-analysis alternate
    scenario on Azure Container Apps using gpt-4.1-mini. Shares the same
    resource group, ACR, Synapse, Storage, and Key Vault as the native scenario.
  tags:
    provider: azure
    geo: us
    tier: alternate
    platform: container-apps
target:
  provider: azure
  regions:
    - eastus2
  geography:
    continent: na
    country: us
    zoneGroup: us-central
  networking:
    defaultNetworkPolicy: private
  services:
    - name: container-apps
      type: container-platform
      providerService: Azure Container Apps
      capabilities:
        supportsManagedIdentity: true
        supportsCustomDomains: true
        supportsScaleToZero: true
        supportsDapr: true
      defaults:
        resourceGroup: rg-financial-analysis
        location: eastus2
        environment: financial-analysis-env-eastus2
        logAnalyticsWorkspace: financial-analysis-logs

    - name: acr
      type: container-registry
      providerService: Azure Container Registry
      endpoints:
        registry: financialanalysisacr.azurecr.io
      defaults:
        registryName: financialanalysisacr
        resourceGroup: rg-financial-analysis

    - name: synapse
      type: spark
      providerService: Azure Synapse Spark
      endpoints:
        workspace: https://financial-analysis-synapse.dev.azuresynapse.net
      defaults:
        workspaceName: financial-analysis-synapse
        sparkPoolName: sparkpool
        resourceGroup: rg-financial-analysis
      capabilities:
        supportsPrivateEndpoints: true

    - name: adls
      type: object-store
      providerService: ADLS Gen2
      endpoints:
        dfs: https://financialanalysissynapse.dfs.core.windows.net
      defaults:
        storageAccountName: financialanalysissynapse
        containerName: data
        resourceGroup: rg-financial-analysis
      capabilities:
        supportsPrivateEndpoints: true

    - name: openai
      type: ai-service
      providerService: Azure OpenAI
      defaults:
        accountName: financial-analysis-openai
        resourceGroup: rg-financial-analysis

    - name: keyvault
      type: secrets
      providerService: Azure Key Vault
      endpoints:
        vault: https://wdf-secret-manager.vault.azure.net/
      capabilities:
        supportsPrivateEndpoints: true

    - name: managed-identity
      type: identity
      providerService: Managed Identity
      defaults:
        identityName: financial-analysis-api-identity
        resourceGroup: rg-financial-analysis

    - name: observability
      type: observability
      providerService: Azure Monitor / Log Analytics

  infrastructure:
    containerAppsEnvironment:
      name: financial-analysis-env-eastus2
      resourceGroup: rg-financial-analysis
      location: eastus2
    containerRegistry:
      name: financialanalysisacr
      service: acr
    secretStores:
      - name: wdf-secret-manager
        service: keyvault
