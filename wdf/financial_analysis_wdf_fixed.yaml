# ==============================================================================
# Workload Definition File (WDF) for Financial Analysis Application
# ==============================================================================
# This WDF deploys the Financial Analysis application with LLM-powered natural
# language queries on NYC taxi/rideshare data to Azure Container Instances (ACI).
# Source: https://github.com/7sg-ai/financial-analysis
#
# The orchestrator will:
# 1. Git Collector Minion: Clone the git repository to NFS
# 2. Secret Manager Minion: Extract secrets from Azure Key Vault to NFS
# 3. Deployment Minion: Apply modifications (fix Java version in Dockerfile)
# 4. Deployment Minion: Build Docker images using ACR Build
# 5. Deployment Minion: Push images to Azure Container Registry (ACR)
# 6. Deployment Minion: Deploy to Azure Container Instances (ACI)
# 7. Deployment Minion: Inject environment variables from NFS
#
# Prerequisites:
# - Azure Key Vault secrets must exist
# - Azure Container Registry (ACR) must exist: uvfinancialacr.azurecr.io
# - Azure credentials in NFS secrets/.env: AZURE_TENANT_ID, AZURE_CLIENT_ID, AZURE_CLIENT_SECRET
# ==============================================================================

apiVersion: wdf.7sg.ai/v1
kind: WorkloadDefinition
version: "1.0.0"
metadata:
  name: financial-analysis
  tags:
    env: production
    app: financial-analysis
    type: api-service
    framework: fastapi-streamlit
    analytics: spark
    llm: azure-openai
  org_id: "7sg-ai"
  id: "financial-analysis"
  workload_id: "financial-analysis"
  version: "1.0.0"
  description: "Financial analysis workload with LLM-powered queries"
  author: "udith@7sg.ai"
  created_at: "2025-11-24T00:00:00Z"
  updated_at: "2025-11-24T00:00:00Z"
  status: "active"

workload:
  type: uvfinancial-analysis-api
  repo: https://github.com/7sg-ai/financial-analysis.git
  branch: main
  path: .  # Root of the repository
  
  # Repository modifications - Fix Java version for Debian Trixie compatibility
  modifications:
    description: |
      The financial analysis application Dockerfiles use Java 17, but Debian Trixie
      (used in python:3.11-slim) only has Java 21 available. We need to update both
      Dockerfile and Dockerfile.streamlit to use Java 21 to match the WDF configuration.
    required_changes:
      - type: update_file
        path: Dockerfile
        description: "Update Java version from 17 to 21 for Debian Trixie compatibility"
        changes:
          - find: "openjdk-17-jre-headless"
            replace: "openjdk-21-jre-headless"
          - find: "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64"
            replace: "JAVA_HOME=/usr/lib/jvm/java-21-openjdk-amd64"
      - type: update_file
        path: Dockerfile.streamlit
        description: "Update Java version from 17 to 21 for Debian Trixie compatibility in Streamlit Dockerfile"
        changes:
          - find: "openjdk-17-jre-headless"
            replace: "openjdk-21-jre-headless"
          - find: "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64"
            replace: "JAVA_HOME=/usr/lib/jvm/java-21-openjdk-amd64"
  
  # Docker build configuration
  build:
    base_image: python:3.11-slim
    context: ./app  # Build context is app/ directory where Dockerfile and frontend/backend are located
    dockerfile: Dockerfile  # Relative to context, so this is app/Dockerfile
    
    build_args:
      PYTHON_VERSION: "3.11"
      BUILD_VERSION: "latest"
    
    ports:
      - 8000  # FastAPI API port
    
    steps:
      system_dependencies:
        - default-jre-headless  # Will be replaced by openjdk-21-jre-headless via modifications
        - procps
        - curl
        - wget
      install_dependencies: true
      build: false
      command:
        - python run_local.py
        - uvicorn api:app --host 0.0.0.0 --port 8000
  
  runtime:
    # Platform: aci for Azure Container Instances
    platform: aci
    regions:
      - eastus
    
    # Docker image configuration
    image:
      repository: uv-financial-analysis-api
      tag: latest
      tagging:
        strategy: deployment_id
        include_latest: true
    
    # Resource requirements
    resources:
      cpu: "1"
      memory: "2"  # GB - increased for Spark workloads
    
    # Ports
    ports:
      - 8000  # FastAPI port
      - 8501  # Streamlit port
    
    # Environment variables
    env:
      - name: NODE_ENV
        value: production
      - name: PYTHONUNBUFFERED
        value: "1"
      - name: LOG_LEVEL
        value: "INFO"
      - name: API_PORT
        value: "8000"
      - name: API_HOST
        value: "0.0.0.0"
      - name: DATA_PATH
        value: "./src_data"
      - name: USE_LOCAL_SPARK
        value: "true"
      - name: SPARK_MASTER
        value: "local[*]"
      - name: JAVA_HOME
        value: "/usr/lib/jvm/java-21-openjdk-amd64"
      - name: AZURE_OPENAI_DEPLOYMENT_NAME
        value: "gpt-4"
      - name: AZURE_OPENAI_API_VERSION
        value: "2024-02-15-preview"
      - name: MAX_QUERY_RETRIES
        value: "3"
      - name: QUERY_TIMEOUT_SECONDS
        value: "300"
      - name: TZ
        value: "UTC"
  
  # Azure Container Instances deployment configuration
  deploy:
    azure_container_instances:
      api_service:
        name: financial-analysis-api
        image: uvfinancialacr.azurecr.io/uv-financial-analysis-api:latest
        dockerfile: ./app/Dockerfile  # Dockerfile is in app/ directory
        resources:
          cpu: 1
          memory: 2Gi
        ports:
          - port: 8000
        dns_name_label: financial-analysis-api
        osType: Linux
        restartPolicy: Always
        
      streamlit_service:
        name: financial-analysis-streamlit
        image: uvfinancialacr.azurecr.io/uv-financial-analysis-frontend:latest  # Same image, different port
        dockerfile: ./app/Dockerfile.streamlit  # Dockerfile.streamlit is in app/ directory (if it exists)
        resources:
          cpu: 1
          memory: 2Gi
        ports:
          - port: 8501
        dns_name_label: financial-analysis-streamlit
        osType: Linux
        restartPolicy: Always
    
    # Health check configuration
    health:
      liveness:
        path: /health
        port: 8000
        scheme: HTTP
        initial_delay_seconds: 60
        period_seconds: 30
        timeout_seconds: 10
        failure_threshold: 3
        success_threshold: 1
      readiness:
        path: /health
        port: 8000
        scheme: HTTP
        initial_delay_seconds: 30
        period_seconds: 10
        timeout_seconds: 5
        failure_threshold: 3
        success_threshold: 1

security:
  policies:
    secretsInEnvAllowed: true
    runAsNonRoot: true
    readOnlyRootFilesystem: false  # Spark needs write access for temp files
    allowPrivilegeEscalation: false

secrets:
  provider: azureKeyVault
  azureKeyVault:
    vault_name: wdf-secret-manager-test
    vault_url: https://wdf-secret-manager-test.vault.azure.net/
    tenant_id: d14f9525-afc9-4197-b391-5de78abfaab5
    client_id: 577d5e76-7ca1-4191-97bd-570b5096e23a
    client_secret: vc68Q~i3B6WU00zIcElAR3hg3tvrjAR_dkUplbGv
    region: East US
  secretRefs:
    - name: azure-openai-endpoint
      injectAs: env
      envVar: AZURE_OPENAI_ENDPOINT
    - name: azure-openai-api-key
      injectAs: env
      envVar: AZURE_OPENAI_API_KEY
    - name: azure-synapse-workspace-name
      injectAs: env
      envVar: AZURE_SYNAPSE_WORKSPACE_NAME
    - name: azure-synapse-spark-pool-name
      injectAs: env
      envVar: AZURE_SYNAPSE_SPARK_POOL_NAME
    - name: azure-subscription-id
      injectAs: env
      envVar: AZURE_SUBSCRIPTION_ID
    - name: azure-resource-group
      injectAs: env
      envVar: AZURE_RESOURCE_GROUP
    - name: azure-storage-account-name
      injectAs: env
      envVar: AZURE_STORAGE_ACCOUNT_NAME
    - name: azure-storage-account-key
      injectAs: env
      envVar: AZURE_STORAGE_ACCOUNT_KEY
    - name: azure-storage-container
      injectAs: env
      envVar: AZURE_STORAGE_CONTAINER

# Azure Container Registry (ACR) configuration
acr:
  registry: uvfinancialacr
  registry_url: uvfinancialacr.azurecr.io
  resource_group: financial-analysis-rg-udith

