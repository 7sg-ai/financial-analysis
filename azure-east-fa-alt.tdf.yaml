apiVersion: tdf.7sg.ai/v1
kind: TargetDefinition
metadata:
  name: azure-east-fa-alt
  displayName: Azure East - Financial Analysis Alternate (gpt-4.1-nano)
  description: >-
    Azure target in eastus2 for deploying the financial-analysis alternate
    scenario (gpt-4.1-nano) on Azure Container Apps. Uses a separate ACR and
    Container Apps environment for isolation, but shares Synapse Spark and
    Key Vault with the native scenario.
  tags:
    provider: azure
    geo: us
    tier: alternate
    platform: container-apps
target:
  provider: azure
  regions:
  - eastus2
  geography:
    continent: na
    country: us
    zoneGroup: us-central
  networking:
    defaultNetworkPolicy: private
  services:
  - name: container-apps
    type: container-platform
    providerService: Azure Container Apps
    capabilities:
      supportsManagedIdentity: true
      supportsCustomDomains: true
      supportsScaleToZero: true
      supportsDapr: true
    defaults:
      resourceGroup: financial-analysis-alt-rg
      location: eastus2
      environment: financial-analysis-alt-env-eastus2
      logAnalyticsWorkspace: financial-analysis-logs

  - name: acr
    type: container-registry
    providerService: Azure Container Registry
    endpoints:
      registry: uvfinancialaltacr.azurecr.io
    defaults:
      registryName: uvfinancialaltacr
      resourceGroup: financial-analysis-alt-rg

  - name: synapse
    type: spark
    providerService: Azure Synapse Spark
    endpoints:
      workspace: https://financial-analysis-synapse.dev.azuresynapse.net
    defaults:
      workspaceName: financial-analysis-synapse
      sparkPoolName: sparkpool
      resourceGroup: rg-financial-analysis
    capabilities:
      supportsPrivateEndpoints: true

  - name: adls
    type: object-store
    providerService: ADLS Gen2
    endpoints:
      dfs: https://financialanalysissynapse.dfs.core.windows.net
    defaults:
      storageAccountName: financialanalysissynapse
      container: data
    capabilities:
      supportsPrivateEndpoints: true

  - name: keyvault
    type: secrets
    providerService: Azure Key Vault
    endpoints:
      vault: https://wdf-secret-manager.vault.azure.net/
    capabilities:
      supportsPrivateEndpoints: true

  - name: managed-identity
    type: identity
    providerService: Managed Identity

  - name: observability
    type: observability
    providerService: Azure Monitor / Log Analytics

  infrastructure:
    containerAppsEnvironment:
      name: financial-analysis-alt-env-eastus2
      resourceGroup: financial-analysis-alt-rg
      location: eastus2
    containerRegistry:
      name: uvfinancialaltacr
      service: acr
    secretStores:
    - name: wdf-secret-manager
      service: keyvault
