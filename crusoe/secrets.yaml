apiVersion: v1
kind: Secret
metadata:
  name: financial-analysis-secrets
  namespace: financial-analysis
type: Opaque
stringData:
  # LLM endpoint API key (set before applying)
  LLM_API_KEY: "REPLACE_WITH_LLM_API_KEY"
  # MinIO credentials
  S3_ACCESS_KEY: "REPLACE_WITH_MINIO_ACCESS_KEY"
  S3_SECRET_KEY: "REPLACE_WITH_MINIO_SECRET_KEY"
