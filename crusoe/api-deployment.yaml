apiVersion: apps/v1
kind: Deployment
metadata:
  name: financial-analysis-api
  namespace: financial-analysis
  labels:
    app: financial-analysis-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: financial-analysis-api
  template:
    metadata:
      labels:
        app: financial-analysis-api
    spec:
      containers:
        - name: api
          image: REPLACE_WITH_CCR_IMAGE_URL:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: financial-analysis-config
            - secretRef:
                name: financial-analysis-secrets
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
      imagePullSecrets:
        - name: ccr-credentials
